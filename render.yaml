services:
  - type: web
    name: rp-future
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: PRODUCTION
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /*