<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Генеративная новелла</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Philosopher:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            left: -100px;
            top: -100px;
            background: rgba(255, 182, 193, 0.2);
        }

        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            right: -50px;
            bottom: -50px;
            background: rgba(173, 216, 230, 0.2);
            animation-delay: -5s;
        }

        .circle:nth-child(3) {
            width: 150px;
            height: 150px;
            left: 50%;
            top: 50%;
            background: rgba(221, 160, 221, 0.2);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(50px, -30px) rotate(5deg);
            }
            50% {
                transform: translate(-20px, 50px) rotate(-3deg);
            }
            75% {
                transform: translate(-40px, -20px) rotate(2deg);
            }
        }

        /* Частицы сакуры */
        .sakura {
            position: fixed;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: linear-gradient(135deg, #ffb7c5 0%, #ff89a1 100%);
            border-radius: 50% 0 50% 50%;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Основной контейнер */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 30px rgba(138, 43, 226, 0.3),
                        inset 0 0 30px rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Заголовок */
        .title {
            font-family: 'Philosopher', sans-serif;
            font-size: 2.5em;
            color: #6b4fa0;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(107, 79, 160, 0.3);
            position: relative;
            display: inline-block;
        }

        .title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8b6fc0, transparent);
            border-radius: 2px;
        }

        /* Декоративные элементы */
        .decorative-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(138, 43, 226, 0.3) 20%,
                rgba(138, 43, 226, 0.5) 50%,
                rgba(138, 43, 226, 0.3) 80%,
                transparent 100%);
            margin: 20px 0;
        }

        /* Кнопки */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .anime-button {
            position: relative;
            padding: 15px 40px;
            font-family: 'Comfortaa', cursive;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(107, 79, 160, 0.3);
        }

        .anime-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 0%,
                rgba(255, 255, 255, 0.1) 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.1) 75%,
                transparent 100%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .anime-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(107, 79, 160, 0.5),
                        0 0 20px rgba(138, 43, 226, 0.4);
        }

        .anime-button:active {
            transform: translateY(2px) scale(0.98);
        }

        .button-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.3);
        }

        .button-secondary:hover {
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5),
                        0 0 20px rgba(245, 87, 108, 0.4);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.95),
                rgba(240, 248, 255, 0.95));
            margin: 10% auto;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(138, 43, 226, 0.3);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-100px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-title {
            font-family: 'Philosopher', sans-serif;
            font-size: 2em;
            color: #6b4fa0;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #764ba2;
            font-weight: 600;
            font-size: 0.9em;
        }

        .anime-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0d5f5;
            border-radius: 25px;
            font-family: 'Comfortaa', cursive;
            font-size: 1em;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
        }

        .anime-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(118, 75, 162, 0.3);
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #764ba2;
        }

        /* Декоративные звездочки */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            animation: sparkle-animation 2s ease-out forwards;
        }

        @keyframes sparkle-animation {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(180deg);
            }
        }
    </style>
</head>
<body>
    <!-- Анимированный фон -->
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Лепестки сакуры -->
    <div class="sakura" id="sakura"></div>

    <!-- Основной контейнер -->
    <div class="container">
        <h1 class="title">Приветствуем в RP Future</h1>

        <div class="decorative-line"></div>

        <div class="button-container">
            <button class="anime-button" onclick="openNewGameModal()">
                ✦ Начать новую игру ✦
            </button>

            <button class="anime-button button-secondary" onclick="continueGame()">
                ♥ Продолжить игру ♥
            </button>
        </div>

        <div class="decorative-line"></div>
    </div>

    <!-- Модальное окно для новой игры -->
    <div id="newGameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeNewGameModal()">&times;</span>
            <h2 class="modal-title">Создание персонажа</h2>

            <div class="input-group">
                <label for="characterName">Имя персонажа:</label>
                <input type="text"
                       id="characterName"
                       class="anime-input"
                       placeholder="Введите имя..."
                       maxlength="50">
            </div>

            <div class="input-group">
                <label for="worldName">Название мира:</label>
                <input type="text"
                       id="worldName"
                       class="anime-input"
                       placeholder="Введите название мира..."
                       maxlength="50">
            </div>

            <div class="modal-buttons">
                <button class="anime-button" onclick="startNewGame()">
                    ✦ Начать приключение ✦
                </button>
                <button class="anime-button button-secondary" onclick="closeNewGameModal()">
                    ✕ Отмена
                </button>
            </div>
        </div>
    </div>

    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // Замени на свой URL
        const SUPABASE_KEY = 'YOUR_SUPABASE_KEY'; // Замени на свой ключ
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Создание лепестков сакуры
        function createSakuraPetals() {
            const sakuraContainer = document.getElementById('sakura');
            const numberOfPetals = 20;

            for (let i = 0; i < numberOfPetals; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = Math.random() * 10 + 10 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                petal.style.width = Math.random() * 10 + 10 + 'px';
                petal.style.height = Math.random() * 10 + 10 + 'px';
                sakuraContainer.appendChild(petal);
            }
        }

        // Создание эффекта искр при клике
        function createSparkleEffect(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.innerHTML = '✦';
            sparkle.style.fontSize = '20px';
            sparkle.style.color = '#764ba2';
            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }

        // Обработчики для модального окна
        function openNewGameModal() {
            document.getElementById('newGameModal').style.display = 'block';
            document.getElementById('characterName').focus();
        }

        function closeNewGameModal() {
            document.getElementById('newGameModal').style.display = 'none';
            document.getElementById('characterName').value = '';
            document.getElementById('worldName').value = '';
        }

        // Функция для генерации ID сессии
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // Начать новую игру
        async function startNewGame() {
            const characterName = document.getElementById('characterName').value.trim();
            const worldName = document.getElementById('worldName').value.trim();

            if (!characterName) {
                alert('Пожалуйста, введите имя персонажа!');
                return;
            }

            if (!worldName) {
                alert('Пожалуйста, введите название мира!');
                return;
            }

            const sessionId = generateSessionId();

            try {
                // Сохраняем данные в Supabase
                const { data, error } = await supabase
                    .from('game_sessions')
                    .insert([
                        {
                            session_id: sessionId,
                            character_name: characterName,
                            world_name: worldName,
                            created_at: new Date().toISOString(),
                            status: 'active'
                        }
                    ]);

                if (error) throw error;

                console.log('Игра создана:', { sessionId, characterName, worldName });

                // Сохраняем ID сессии в localStorage для возможности продолжить
                localStorage.setItem('currentSessionId', sessionId);
                localStorage.setItem('currentCharacterName', characterName);
                localStorage.setItem('currentWorldName', worldName);

                closeNewGameModal();

                // Здесь будет переход к следующей странице
                alert(`Приключение начинается!\nПерсонаж: ${characterName}\nМир: ${worldName}`);

            } catch (error) {
                console.error('Ошибка при создании игры:', error);
                alert('Произошла ошибка при создании игры. Попробуйте снова.');
            }
        }

        // Продолжить игру
        async function continueGame() {
            const sessionId = localStorage.getItem('currentSessionId');

            if (!sessionId) {
                alert('Нет сохраненных игр. Начните новую игру!');
                return;
            }

            try {
                // Проверяем существование сессии в Supabase
                const { data, error } = await supabase
                    .from('game_sessions')
                    .select('*')
                    .eq('session_id', sessionId)
                    .single();

                if (error || !data) {
                    alert('Сохраненная игра не найдена. Начните новую игру!');
                    localStorage.removeItem('currentSessionId');
                    return;
                }

                console.log('Продолжаем игру:', data);

                // Здесь будет переход к продолжению игры
                alert(`Продолжаем игру!\nПерсонаж: ${data.character_name}\nМир: ${data.world_name}`);

            } catch (error) {
                console.error('Ошибка при загрузке игры:', error);
                alert('Произошла ошибка при загрузке игры.');
            }
        }

        // Добавляем эффект искр при клике на кнопки
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('anime-button')) {
                createSparkleEffect(e.clientX, e.clientY);
            }
        });

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('newGameModal');
            if (event.target == modal) {
                closeNewGameModal();
            }
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            createSakuraPetals();
            console.log('RP Future - Главная страница загружена');
        });
    </script>
</body>
</html>
