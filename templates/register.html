<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Регистрация</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comfortaa', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; justify-content: center; align-items: center;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            padding: 35px; border-radius: 25px;
            width: 90%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; font-size: 1.8em;
        }
        .field { text-align: left; margin-bottom: 8px; }
        .field label { font-size: 0.8em; color: #666; margin-left: 12px; }
        input {
            width: 100%; padding: 12px 16px; margin: 4px 0;
            border: 2px solid #e0d5f5; border-radius: 20px;
            font-family: 'Comfortaa', sans-serif; font-size: 0.9em; outline: none;
        }
        input:focus { border-color: #764ba2; }
        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 20px;
            font-family: 'Comfortaa', sans-serif; font-size: 1em; font-weight: 700;
            cursor: pointer; margin-top: 15px; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .link { color: #764ba2; text-decoration: none; font-size: 0.85em; margin-top: 12px; display: inline-block; }
        .error { color: #ff4444; font-size: 0.75em; margin-top: 4px; display: none; text-align: left; margin-left: 12px; }
        .success { color: #4caf50; font-size: 0.85em; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>✨ Регистрация</h1>
        <div class="field"><label>Отображаемое имя</label><input type="text" id="displayName" placeholder="Как к вам обращаться?"></div>
        <div class="field"><label>Логин</label><input type="text" id="login" placeholder="Минимум 3 символа"></div>
        <div class="field"><label>Пароль</label><input type="password" id="password" placeholder="Минимум 4 символа"></div>
        <div class="field"><label>Повторите пароль</label><input type="password" id="passwordConfirm" placeholder="Повторите пароль"></div>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <button class="btn" onclick="doRegister()">Зарегистрироваться</button>
        <br><a href="/login" class="link">Уже есть аккаунт? Войти</a>
    </div>
    <script>
        async function doRegister(){
            const dn=document.getElementById('displayName').value.trim();
            const login=document.getElementById('login').value.trim();
            const pwd=document.getElementById('password').value.trim();
            const pwd2=document.getElementById('passwordConfirm').value.trim();
            const err=document.getElementById('error'), ok=document.getElementById('success');
            err.style.display='none'; ok.style.display='none';
            if(!dn||!login||!pwd||!pwd2){ err.textContent='Все поля обязательны'; err.style.display='block'; return; }
            if(pwd!==pwd2){ err.textContent='Пароли не совпадают'; err.style.display='block'; return; }
            try{
                const resp=await fetch('/api/register',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username:login,login,password:pwd,password_confirm:pwd2,display_name:dn})
                });
                const data=await resp.json();
                if(data.success){
                    ok.textContent='Аккаунт создан! Переходим на вход...'; ok.style.display='block';
                    setTimeout(()=>window.location.href='/login',1500);
                }else{ err.textContent=data.error; err.style.display='block'; }
            }catch(e){ err.textContent='Ошибка соединения'; err.style.display='block'; }
        }
    </script>
</body>
</html>
