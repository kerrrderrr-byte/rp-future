<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Мои миры</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #0d0d2b 50%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,182,193,0.2);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,182,193,0.3);
            background: rgba(255,255,255,0.05);
            color: #FFB6C1;
            font-family: 'Comfortaa', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 0.9em;
        }
        .btn:hover { background: rgba(255,105,180,0.2); }
        .btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; }
        .btn.danger { border-color: #ff4444; color: #ff4444; }
        .btn.danger:hover { background: rgba(255,68,68,0.2); }

        .saves-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .save-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,182,193,0.15);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .save-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,105,180,0.4);
            transform: translateX(5px);
        }
        .save-info { flex: 1; }
        .save-name {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 5px;
            color: #FFB6C1;
        }
        .save-world {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 8px;
        }
        .save-world span { color: #fff; }
        .save-meta {
            font-size: 0.75em;
            color: #666;
            display: flex;
            gap: 20px;
        }
        .save-meta span { color: #aaa; }
        .save-preview {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 0.8em;
            color: #999;
            font-style: italic;
        }
        .save-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 4em; margin-bottom: 15px; }
        .empty-state p { font-size: 1.1em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Мои миры</h1>
            <div class="user-info">
                <span>👤 {{ user.display_name }}</span>
                <a href="/" class="btn">🏠 Главная</a>
                <a href="/api/logout" class="btn" onclick="logout(event)">🚪 Выйти</a>
            </div>
        </div>

        <div class="saves-grid" id="savesGrid">
            <div style="text-align:center;color:#666;padding:40px;">Загрузка сохранений...</div>
        </div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">🌍</div>
            <p>У тебя пока нет сохранённых миров</p>
            <a href="/" class="btn primary">✦ Создать новый мир</a>
        </div>
    </div>

    <script>
        async function loadSaves() {
            try {
                const resp = await fetch('/api/saves/list');
                const data = await resp.json();

                const grid = document.getElementById('savesGrid');
                const empty = document.getElementById('emptyState');

                if (data.success && data.saves.length > 0) {
                    grid.innerHTML = data.saves.map(save => `
                        <div class="save-card" onclick="loadGame('${save.session_id}')">
                            <div class="save-info">
                                <div class="save-name">👤 ${save.player_name}</div>
                                <div class="save-world">🌍 Мир: <span>${save.world_name || save.world_id}</span></div>
                                <div class="save-meta">
                                    <span>📍 ${save.current_location || 'Неизвестно'}</span>
                                    <span>📅 ${new Date(save.last_updated || save.created_at).toLocaleDateString('ru-RU')}</span>
                                    <span>🕐 ${new Date(save.last_updated || save.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})}</span>
                                </div>
                                ${save.last_scene_preview ? `<div class="save-preview">${save.last_scene_preview}</div>` : ''}
                            </div>
                            <div class="save-actions">
                                <button class="btn primary" onclick="event.stopPropagation(); loadGame('${save.session_id}')">▶ Играть</button>
                                <button class="btn danger" onclick="event.stopPropagation(); deleteSave('${save.session_id}')">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                    empty.style.display = 'none';
                } else {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                }
            } catch (e) {
                document.getElementById('savesGrid').innerHTML = '<div style="text-align:center;color:#ff4444;">Ошибка загрузки</div>';
            }
        }

        function loadGame(sessionId) {
            localStorage.setItem('currentSessionId', sessionId);
            window.location.href = '/game?session=' + sessionId;
        }

        async function deleteSave(sessionId) {
            if (!confirm('Удалить это сохранение навсегда?')) return;

            try {
                await fetch('/api/saves/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                if (localStorage.getItem('currentSessionId') === sessionId) {
                    localStorage.removeItem('currentSessionId');
                }

                loadSaves();
            } catch (e) {
                alert('Ошибка удаления');
            }
        }

        function logout(e) {
            e.preventDefault();
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/login';
            });
        }

        document.addEventListener('DOMContentLoaded', loadSaves);
    </script>
</body>
</html>
