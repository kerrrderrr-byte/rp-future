<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RP Future - Академия Сакура</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-x;
            position: fixed;
            width: 100%;
        }

        .novel-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Сцена с камерой */
        .scene-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 50%;
        }

        .scene-camera {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            align-items: flex-end;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        /* Фон внутри камеры */
        .scene-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 300vw;
            height: 100%;
            background-size: auto 100%;
            background-position: center top;
            background-repeat: repeat-x;
            z-index: 0;
        }

        .bg-classroom { background-image: url('/static/images/backgrounds/bg_classroom.png'); }
        .bg-rooftop { background-image: url('/static/images/backgrounds/bg_rooftop.png'); }
        .bg-library { background-image: url('/static/images/backgrounds/bg_library.png'); }
        .bg-courtyard { background-image: url('/static/images/backgrounds/bg_courtyard.png'); }
        .bg-cafeteria { background-image: url('/static/images/backgrounds/bg_cafeteria.png'); }
        .bg-gym { background-image: url('/static/images/backgrounds/bg_gym.png'); }
        .bg-clubroom { background-image: url('/static/images/backgrounds/bg_clubroom.png'); }
        .bg-nursery { background-image: url('/static/images/backgrounds/bg_nursery.png'); }
        .bg-park { background-image: url('/static/images/backgrounds/bg_park.png'); }
        .bg-mall { background-image: url('/static/images/backgrounds/bg_mall.png'); }
        .bg-beach { background-image: url('/static/images/backgrounds/bg_beach.png'); }
        .bg-shrine { background-image: url('/static/images/backgrounds/bg_shrine.png'); }
        .bg-hallway { background-image: url('/static/images/backgrounds/bg_hallway.png'); }
        .bg-gate { background-image: url('/static/images/backgrounds/bg_gate.png'); }
        .bg-classroom-evening { background-image: url('/static/images/backgrounds/bg_classroom_evening.png'); }

        /* Затемнение */
        .vignette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Спрайты */
        .sprites-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 300vw;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            pointer-events: none;
        }

        .sprite-slot {
            position: absolute;
            bottom: 5%;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: brightness(0.7) saturate(0.8);
        }

        .sprite-slot.visible {
            display: block;
        }

        .sprite-slot.hidden {
            display: none;
        }

        .sprite-slot.highlighted {
            filter: brightness(1.2) saturate(1.2) drop-shadow(0 0 20px rgba(255,255,255,0.8));
            transform: translateY(-10px) scale(1.05);
            z-index: 10;
        }

        .sprite-slot img {
            max-height: 55vh;
            max-width: 35vw;
            object-fit: contain;
            object-position: bottom;
        }

        .sprite-name-tag {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7em;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sprite-slot.highlighted .sprite-name-tag {
            opacity: 1;
            background: rgba(255,255,255,0.9);
            color: #000;
            font-weight: 700;
        }

        /* Локация */
        .location-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #FFB6C1;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.7em;
            letter-spacing: 1px;
            z-index: 5;
            backdrop-filter: blur(5px);
        }

        /* Текстовое поле */
        .text-box {
            background: linear-gradient(180deg, rgba(10,10,20,0.9) 0%, rgba(10,10,20,0.98) 100%);
            padding: 12px 15px 20px;
            border-top: 1px solid rgba(255,182,193,0.2);
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .speaker-tag {
            display: none;
            margin-bottom: 6px;
        }

        .speaker-tag span {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .narrator-line {
            color: #a0a0c0;
            font-style: italic;
            font-size: 0.75em;
            margin-bottom: 4px;
            min-height: 18px;
            line-height: 1.5;
        }

        .dialogue-line {
            color: #fff;
            font-size: 0.9em;
            line-height: 1.6;
            min-height: 40px;
            letter-spacing: 0.5px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #FFB6C1;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Ввод */
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        #playerInput {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,182,193,0.3);
            color: #fff;
            padding: 10px 14px;
            border-radius: 20px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 0.85em;
            outline: none;
        }

        #playerInput:focus {
            border-color: #FFB6C1;
            background: rgba(255,255,255,0.12);
        }

        #playerInput::placeholder {
            color: #5a5a7a;
        }

        .send-btn {
            background: linear-gradient(135deg, #ff69b4, #ff8c42);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            min-width: 44px;
        }

        .send-btn:disabled {
            opacity: 0.4;
        }

        .hint-text {
            text-align: right;
            color: #5a5a7a;
            font-size: 0.65em;
            margin-top: 4px;
        }

        /* Подсказка свайпа */
        .swipe-hint {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            color: rgba(255,255,255,0.3);
            font-size: 1.5em;
            pointer-events: none;
            animation: fadeHint 3s forwards;
            z-index: 3;
        }

        @keyframes fadeHint {
            0%, 70% { opacity: 0.4; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="novel-container">
        <!-- Вьюпорт с камерой -->
        <div class="scene-viewport" id="sceneViewport">
            <div class="scene-background bg-classroom" id="sceneBg"></div>
            <div class="vignette"></div>

            <!-- Спрайты -->
            <div class="sprites-layer" id="spritesLayer">
                <!-- Слоты для всех 12 персонажей -->
            </div>

            <div class="location-tag" id="locationTag">📍 Загрузка...</div>
            <div class="swipe-hint" id="swipeHint">← свайп →</div>
        </div>

        <!-- Текст -->
        <div class="text-box" id="textBox">
            <div class="speaker-tag" id="speakerTag"><span id="speakerTagName"></span></div>
            <div class="narrator-line" id="narratorLine"></div>
            <div class="dialogue-line" id="dialogueLine">
                <span id="typingText"></span><span class="typing-cursor" id="typingCursor"></span>
            </div>
            <div class="input-row">
                <input type="text" id="playerInput" placeholder="Действие или реплика..." maxlength="150" autocomplete="off" disabled>
                <button class="send-btn" id="sendBtn" disabled>▶</button>
            </div>
            <div class="hint-text">Тап по тексту — скип</div>
        </div>
    </div>

    <script>
        // ==================== MOBILE GAME ENGINE ====================
        const sessionId = new URLSearchParams(window.location.search).get('session');

        // Состояния
        let gameData = null;
        let isTyping = false;
        let typingTimer = null;
        let waitingForInput = true;
        let cameraX = 0; // Позиция камеры (0 = левый край, 1 = правый)
        let targetCameraX = 0.5; // Куда камера стремится
        let isSwiping = false;
        let swipeStartX = 0;
        let swipeStartCamera = 0;
        let dialogueInProgress = false; // Идёт ли диалог (блокирует свайп)

        const SPRITE_SLOTS = [
            { id: 'garfild', pos: 0.1, name: '📋 Гарфилд', color: '#ff8c42' },
            { id: 'monika', pos: 0.25, name: '📚 Моника', color: '#ff69b4' },
            { id: 'reiko', pos: 0.4, name: '🏃‍♀️ Рейко', color: '#00d4aa' },
            { id: 'yuki', pos: 0.5, name: '🎨 Юки', color: '#b8a9d4' },
            { id: 'takeshi', pos: 0.55, name: '👊 Такеши', color: '#ff4444' },
            { id: 'hana', pos: 0.6, name: '👑 Хана', color: '#4da6ff' },
            { id: 'haru', pos: 0.65, name: '😄 Хару', color: '#ffd700' },
            { id: 'akira', pos: 0.7, name: '💻 Акира', color: '#7cfc00' },
            { id: 'sensei', pos: 0.75, name: '👨‍🏫 Сенсей', color: '#deb887' },
            { id: 'yumi', pos: 0.8, name: '💉 Юми', color: '#ff9999' },
            { id: 'ryuu', pos: 0.85, name: '⚔️ Рю', color: '#808080' },
            { id: 'emi', pos: 0.9, name: '📰 Эми', color: '#ff1493' }
        ];

        // ==================== ИНИЦИАЛИЗАЦИЯ СПРАЙТОВ ====================
        function createSpriteSlots() {
            const layer = document.getElementById('spritesLayer');
            SPRITE_SLOTS.forEach(slot => {
                const div = document.createElement('div');
                div.className = 'sprite-slot hidden';
                div.id = `slot-${slot.id}`;
                div.style.left = (slot.pos * 100) + '%';
                div.innerHTML = `
                    <img src="/static/images/sprites/${getSpriteFile(slot.id)}" alt="${slot.name}">
                    <div class="sprite-name-tag">${slot.name}</div>
                `;
                layer.appendChild(div);
            });
        }

        function getSpriteFile(id) {
            const map = {
                'garfild': 'boy_garfild.png', 'monika': 'girl_monika.png', 'reiko': 'girl_reiko.png',
                'yuki': 'girl_yuki.png', 'takeshi': 'boy_takeshi.png', 'hana': 'girl_hana.png',
                'haru': 'boy_haru.png', 'akira': 'boy_akira.png', 'sensei': 'boy_sensei.png',
                'yumi': 'girl_yumi.png', 'ryuu': 'boy_ryuu.png', 'emi': 'girl_emi.png'
            };
            return map[id] || 'boy_garfild.png';
        }

        // ==================== КАМЕРА ====================
        function updateCamera() {
            const bg = document.getElementById('sceneBg');
            const sprites = document.getElementById('spritesLayer');
            // Сдвигаем фон и спрайты
            const offset = -cameraX * 200; // 300vw total, двигаемся на 200vw
            bg.style.transform = `translateX(${offset}vw)`;
            sprites.style.transform = `translateX(${offset}vw)`;
        }

        function focusOnSpeaker(speakerId) {
            const slot = SPRITE_SLOTS.find(s => s.id === speakerId);
            if (slot) {
                targetCameraX = slot.pos;
                dialogueInProgress = true;
            }
        }

        function releaseCamera() {
            dialogueInProgress = false;
            // Возвращаем камеру в центр через 2 сек
            setTimeout(() => {
                if (!dialogueInProgress) {
                    targetCameraX = 0.5;
                }
            }, 2000);
        }

        function animateCamera() {
            // Плавное движение камеры
            cameraX += (targetCameraX - cameraX) * 0.1;
            if (Math.abs(targetCameraX - cameraX) < 0.001) {
                cameraX = targetCameraX;
            }
            updateCamera();
            requestAnimationFrame(animateCamera);
        }

        // ==================== СВАЙПЫ ====================
        const viewport = document.getElementById('sceneViewport');

        viewport.addEventListener('touchstart', (e) => {
            if (dialogueInProgress || isTyping) return;
            isSwiping = true;
            swipeStartX = e.touches[0].clientX;
            swipeStartCamera = targetCameraX;
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (!isSwiping || dialogueInProgress || isTyping) return;
            const dx = e.touches[0].clientX - swipeStartX;
            const viewportWidth = viewport.offsetWidth;
            const cameraDelta = -(dx / viewportWidth) * 0.5;
            targetCameraX = Math.max(0, Math.min(1, swipeStartCamera + cameraDelta));
        }, { passive: true });

        viewport.addEventListener('touchend', () => {
            isSwiping = false;
        });

        // ==================== ТЕКСТ ====================
        async function loadGame() {
            if (!sessionId) return;
            try {
                const resp = await fetch(`/api/load_game_data?session=${sessionId}`);
                const data = await resp.json();
                if (data.success) {
                    gameData = data.game;
                    document.getElementById('locationTag').textContent = '📍 ' + data.game.location_name;
                    updateBackground(data.game.current_location);
                    if (gameData.game_history.length > 0) {
                        await displayScene(gameData.game_history[gameData.game_history.length - 1]);
                    }
                    enableInput();
                }
            } catch (e) {
                console.error(e);
            }
        }

        function updateBackground(loc) {
            const bg = document.getElementById('sceneBg');
            bg.className = 'scene-background';
            const map = {
                'classroom': 'bg-classroom', 'rooftop': 'bg-rooftop', 'library': 'bg-library',
                'courtyard': 'bg-courtyard', 'cafeteria': 'bg-cafeteria', 'gym': 'bg-gym',
                'clubroom': 'bg-clubroom', 'nursery': 'bg-nursery', 'park': 'bg-park',
                'mall': 'bg-mall', 'beach': 'bg-beach', 'shrine': 'bg-shrine',
                'hallway': 'bg-hallway', 'gate': 'bg-gate', 'classroom_evening': 'bg-classroom-evening'
            };
            bg.classList.add(map[loc] || 'bg-classroom');
        }

        async function typeText(el, text, speed = 35) {
            isTyping = true;
            el.textContent = '';
            document.getElementById('typingCursor').style.display = 'inline-block';
            disableInput();
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        el.textContent += text[i++];
                        const delay = (text[i-1] === '.' || text[i-1] === '!') ? speed*4 : speed;
                        typingTimer = setTimeout(type, delay);
                    } else {
                        document.getElementById('typingCursor').style.display = 'none';
                        isTyping = false;
                        resolve();
                    }
                }
                type();
            });
        }

        function skipTyping() {
            if (isTyping && typingTimer) {
                clearTimeout(typingTimer);
                isTyping = false;
                document.getElementById('typingCursor').style.display = 'none';
            }
        }

        function updateSprites(sprites) {
            if (!sprites) return;
            Object.keys(sprites).forEach(id => {
                const slot = document.getElementById(`slot-${id}`);
                if (!slot) return;
                const cfg = sprites[id];
                if (cfg && cfg.visible) {
                    slot.classList.remove('hidden');
                    slot.classList.add('visible');
                    if (cfg.highlight) {
                        slot.classList.add('highlighted');
                        focusOnSpeaker(id);
                    } else {
                        slot.classList.remove('highlighted');
                    }
                } else {
                    slot.classList.add('hidden');
                    slot.classList.remove('visible', 'highlighted');
                }
            });
        }

        async function displayScene(scene) {
            document.getElementById('speakerTag').style.display = 'none';
            document.getElementById('narratorLine').textContent = '';
            document.getElementById('typingText').textContent = '';

            disableInput();

            if (scene.type === 'player_action') {
                document.getElementById('typingText').style.color = '#FFB6C1';
                document.getElementById('typingCursor').style.display = 'inline-block';
                await typeText(document.getElementById('typingText'), '🗣️ ' + scene.player_text, 12);
                enableInput();
                return;
            }

            if (scene.sprites) updateSprites(scene.sprites);
            if (scene.location) {
                updateBackground(scene.location);
                document.getElementById('locationTag').textContent = '📍 ' + (scene.location || '');
            }
            if (scene.narrator_text) {
                document.getElementById('narratorLine').textContent = scene.narrator_text;
            }

            const speakerId = scene.speaker_id || 'narrator';
            if (speakerId !== 'narrator') {
                document.getElementById('speakerTag').style.display = 'block';
                const tag = document.getElementById('speakerTagName');
                tag.textContent = scene.speaker_name || speakerId;
                tag.style.background = SPRITE_SLOTS.find(s => s.id === speakerId)?.color || '#fff';
                tag.style.color = '#000';
            }

            const text = scene.speaker_text || '...';
            document.getElementById('typingText').style.color = speakerId === 'narrator' ? '#c0c0c0' : '#fff';
            document.getElementById('typingCursor').style.display = 'inline-block';
            await typeText(document.getElementById('typingText'), text);

            if (scene.dialog_end_marker === 'direct_question_to_player') {
                releaseCamera();
            }

            enableInput();
            setTimeout(releaseCamera, 1500);
        }

        function enableInput() {
            document.getElementById('playerInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            waitingForInput = true;
            setTimeout(() => document.getElementById('playerInput').focus(), 100);
        }

        function disableInput() {
            document.getElementById('playerInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            waitingForInput = false;
        }

        async function sendAction() {
            if (isTyping) { skipTyping(); enableInput(); return; }
            if (!waitingForInput) return;

            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            if (!action) return;

            input.value = '';
            disableInput();
            await displayScene({ type: 'player_action', player_text: action });

            try {
                const resp = await fetch('/api/game_action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, action })
                });
                const data = await resp.json();
                if (data.success && data.scene) {
                    await new Promise(r => setTimeout(r, 500));
                    await displayScene(data.scene);
                }
            } catch (e) {
                console.error(e);
                enableInput();
            }
        }

        // ==================== ОБРАБОТЧИКИ ====================
        document.getElementById('playerInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); sendAction(); }
        });

        document.getElementById('sendBtn').addEventListener('click', e => {
            e.preventDefault(); sendAction();
        });

        document.getElementById('textBox').addEventListener('click', e => {
            if (isTyping && e.target.id !== 'playerInput' && e.target.id !== 'sendBtn') {
                skipTyping();
                enableInput();
            }
        });

        // ==================== СТАРТ ====================
        window.addEventListener('DOMContentLoaded', () => {
            createSpriteSlots();
            // Начальная позиция камеры
            cameraX = 0.5;
            targetCameraX = 0.5;
            updateCamera();
            requestAnimationFrame(animateCamera);

            // Убираем подсказку свайпа через 5 сек
            setTimeout(() => {
                document.getElementById('swipeHint').style.display = 'none';
            }, 5000);

            loadGame();
        });
    </script>
</body>
</html>
