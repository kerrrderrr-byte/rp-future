<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Вход</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comfortaa', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            padding: 40px; border-radius: 25px;
            width: 90%; max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px; font-size: 2em;
        }
        input {
            width: 100%; padding: 12px 16px; margin: 8px 0;
            border: 2px solid #e0d5f5; border-radius: 20px;
            font-family: 'Comfortaa', sans-serif; font-size: 0.9em; outline: none;
        }
        input:focus { border-color: #764ba2; }
        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 20px;
            font-family: 'Comfortaa', sans-serif; font-size: 1em; font-weight: 700;
            cursor: pointer; margin-top: 12px; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(107,79,160,0.4); }
        .link { color: #764ba2; text-decoration: none; font-size: 0.85em; margin-top: 15px; display: inline-block; }
        .error { color: #ff4444; font-size: 0.8em; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎮 RP Future</h1>
        <input type="text" id="login" placeholder="Логин" autocomplete="username">
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        <div class="error" id="error"></div>
        <button class="btn" onclick="doLogin()">Войти</button>
        <br><a href="/register" class="link">Создать аккаунт</a>
        <br><a href="/" class="link">На главную</a>
    </div>
    <script>
        async function doLogin() {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            if(!login || !password){ errorEl.textContent='Заполни все поля'; errorEl.style.display='block'; return; }
            try{
                const resp = await fetch('/api/login', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({login,password})
                });
                const data = await resp.json();
                if(data.success){ window.location.href='/'; }
                else { errorEl.textContent = data.error; errorEl.style.display='block'; }
            }catch(e){ errorEl.textContent='Ошибка соединения'; errorEl.style.display='block'; }
        }
        document.getElementById('password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    </script>
</body>
</html>
