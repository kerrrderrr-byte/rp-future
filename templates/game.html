<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Академия Сакура</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #000;
            user-select: none;
            cursor: default;
        }

        /* Контейнер новеллы */
        .novel-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Фон сцены - настоящие изображения */
        .scene-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        .scene-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            transition: background 1s ease;
        }

        /* Затемнение для текстового поля */
        .scene-vignette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(0deg,
                rgba(0, 0, 0, 0.5) 0%,
                rgba(0, 0, 0, 0.2) 50%,
                transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Фоны для каждой локации */
        .bg-classroom {
            background-image: url('/static/images/backgrounds/bg_classroom.png');
        }

        .bg-rooftop {
            background-image: url('/static/images/backgrounds/bg_rooftop.png');
        }

        .bg-rooftop::after {
            background: rgba(255, 100, 50, 0.15);
        }

        .bg-library {
            background-image: url('/static/images/backgrounds/bg_library.png');
        }

        .bg-library::after {
            background: rgba(0, 0, 0, 0.25);
        }

        .bg-courtyard {
            background-image: url('/static/images/backgrounds/bg_courtyard.png');
        }

        .bg-courtyard::after {
            background: rgba(255, 182, 193, 0.1);
        }

        /* Лепестки сакуры */
        .sakura-petals {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: none;
        }

        .sakura-petals.active {
            display: block;
        }

        .petal {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255, 182, 193, 0.8);
            border-radius: 50% 0 50% 50%;
            animation: petalFall 8s linear infinite;
        }

        @keyframes petalFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translate(100px, 100vh) rotate(720deg); opacity: 0; }
        }

        /* Область сцены */
        .scene-area {
            flex: 1;
            position: relative;
            min-height: 55%;
            overflow: hidden;
            z-index: 1;
        }

        /* Контейнер для спрайтов */
        .sprites-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 60px;
            padding: 0 12%;
            z-index: 3;
        }

        /* Спрайт персонажа */
        .character-sprite {
            position: relative;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: none;
            filter: brightness(0.85) saturate(0.9) drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
        }

        .character-sprite.visible {
            display: block;
            animation: spriteAppear 0.8s ease;
        }

        .character-sprite.highlighted {
            filter: brightness(1.15) saturate(1.15) drop-shadow(0 0 25px rgba(255, 255, 255, 0.7));
            transform: translateY(-8px) scale(1.04);
            z-index: 10;
        }

        @keyframes spriteAppear {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .character-sprite img {
            max-height: 65vh;
            max-width: 30vw;
            width: auto;
            height: auto;
            display: block;
            transition: all 0.8s ease;
            object-fit: contain;
        }

        /* Имя над спрайтом */
        .sprite-name {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 5px 14px;
            border-radius: 15px;
            font-size: 0.8em;
            white-space: nowrap;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .character-sprite.highlighted .sprite-name {
            opacity: 1;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            font-weight: 700;
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* Эмоция над спрайтом */
        .emotion-bubble {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8em;
            animation: emotionFloat 2s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
        }

        .character-sprite.highlighted .emotion-bubble {
            opacity: 1;
        }

        @keyframes emotionFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .location-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            color: #FFB6C1;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.85em;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 182, 193, 0.4);
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* Текстовое поле */
        .text-box-container {
            background: linear-gradient(180deg,
                rgba(10, 10, 20, 0) 0%,
                rgba(10, 10, 20, 0.95) 8%,
                rgba(10, 10, 20, 0.98) 100%);
            padding: 25px 40px 30px;
            min-height: 35%;
            display: flex;
            flex-direction: column;
            border-top: 2px solid rgba(255, 182, 193, 0.25);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        /* Имя говорящего */
        .speaker-name-box {
            margin-bottom: 12px;
            display: none;
            animation: slideName 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideName {
            from { opacity: 0; transform: translateX(-20px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .speaker-name {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .speaker-name::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 22px;
            width: 12px;
            height: 12px;
            background: inherit;
            transform: rotate(45deg);
        }

        /* Текст рассказчика */
        .narrator-text {
            color: #b0a0c0;
            font-style: italic;
            margin-bottom: 8px;
            font-size: 0.9em;
            line-height: 1.6;
            opacity: 0.9;
            min-height: 24px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* Основной текст */
        .dialogue-text {
            color: #ffffff;
            font-size: 1.15em;
            line-height: 1.8;
            margin-bottom: 15px;
            flex: 1;
            letter-spacing: 0.8px;
            position: relative;
            min-height: 30px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* Мигающий курсор */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #FFB6C1;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.8s infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Поле ввода */
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        #playerInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 182, 193, 0.3);
            color: #fff;
            padding: 14px 22px;
            border-radius: 30px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        #playerInput:focus {
            border-color: #FFB6C1;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 25px rgba(255, 182, 193, 0.2);
        }

        #playerInput::placeholder {
            color: #6a5a7a;
            font-style: italic;
        }

        .send-button {
            background: linear-gradient(135deg, #ff69b4, #ff8c42);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
        }

        .send-button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.5);
        }

        .send-button:active {
            transform: scale(0.95);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .continue-hint {
            position: absolute;
            bottom: 8px;
            right: 40px;
            color: #8a7a9a;
            font-size: 0.75em;
            animation: hintPulse 2s infinite;
            pointer-events: none;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .history-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            color: #FFB6C1;
            border: 1px solid rgba(255, 182, 193, 0.3);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85em;
            z-index: 20;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .history-button:hover {
            background: rgba(255, 105, 180, 0.2);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }

        .disable-selection {
            user-select: none;
            -webkit-user-select: none;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .sprites-container {
                gap: 20px;
                padding: 0 5%;
            }

            .character-sprite img {
                max-height: 50vh;
                max-width: 35vw;
            }

            .text-box-container {
                padding: 20px 25px 25px;
            }
        }
    </style>
</head>
<body class="disable-selection">
    <div class="novel-container">
        <!-- Фон сцены -->
        <div class="scene-background bg-classroom" id="sceneBackground"></div>

        <!-- Виньетка -->
        <div class="scene-vignette"></div>

        <!-- Лепестки сакуры -->
        <div class="sakura-petals" id="sakuraPetals"></div>

        <!-- Область сцены -->
        <div class="scene-area" id="sceneArea">
            <div class="location-label" id="locationLabel">
                📍 Загрузка...
            </div>

            <!-- Контейнер спрайтов -->
            <div class="sprites-container" id="spritesContainer">
                <!-- Гарфилд - левый -->
                <div class="character-sprite" id="sprite-garfild" data-position="left" style="order: 1;">
                    <div class="emotion-bubble" id="emotion-garfild"></div>
                    <img src="/static/images/sprites/boy_test_garfild.png" alt="Гарфилд" id="img-garfild">
                    <div class="sprite-name">📋 Гарфилд</div>
                </div>

                <!-- Моника - центр -->
                <div class="character-sprite" id="sprite-monika" data-position="center" style="order: 2;">
                    <div class="emotion-bubble" id="emotion-monika"></div>
                    <img src="/static/images/sprites/girl_test_monika.png" alt="Моника" id="img-monika">
                    <div class="sprite-name">📚 Моника</div>
                </div>

                <!-- Рейко - правый -->
                <div class="character-sprite" id="sprite-reiko" data-position="right" style="order: 3;">
                    <div class="emotion-bubble" id="emotion-reiko"></div>
                    <img src="/static/images/sprites/girl_test_reiko.png" alt="Рейко" id="img-reiko">
                    <div class="sprite-name">🏃‍♀️ Рейко</div>
                </div>
            </div>
        </div>

        <!-- Текстовое поле -->
        <div class="text-box-container">
            <div class="speaker-name-box" id="speakerNameBox">
                <span class="speaker-name" id="speakerName"></span>
            </div>

            <div class="narrator-text" id="narratorText"></div>
            <div class="dialogue-text" id="dialogueText">
                <span id="typingText"></span>
                <span class="typing-cursor" id="typingCursor"></span>
            </div>

            <div class="input-area">
                <input type="text"
                       id="playerInput"
                       placeholder="Что ты хочешь сделать или сказать?"
                       maxlength="200"
                       autocomplete="off"
                       disabled>
                <button class="send-button" id="sendButton" onclick="sendAction()" disabled>
                    ▶
                </button>
            </div>

            <div class="continue-hint">
                Пробел — скип • Enter — отправить
            </div>
        </div>

        <button class="history-button" onclick="showHistory()">
            📜 История
        </button>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let gameData = null;
        let currentScene = null;
        let isTyping = false;
        let typingTimeout = null;
        const sessionId = new URLSearchParams(window.location.search).get('session');

        const TYPING_SPEED = 40;
        const FAST_TYPING_SPEED = 12;

        // Эмоции → эмодзи
        const EMOTION_ICONS = {
            'радость': '😊',
            'грусть': '😢',
            'злость': '😠',
            'удивление': '😲',
            'нейтрально': '😐',
            'смущение': '😳',
            'восторг': '🤩',
            'happy': '😊',
            'sad': '😢',
            'angry': '😠',
            'surprised': '😲',
            'normal': '😐',
            'excited': '🤩',
            'serious': '🧐'
        };

        // ==================== ФУНКЦИИ УПРАВЛЕНИЯ СПРАЙТАМИ ====================

        function updateSprites(sprites) {
            if (!sprites) return;

            const characters = ['garfild', 'monika', 'reiko'];

            characters.forEach(charId => {
                const sprite = document.getElementById(`sprite-${charId}`);
                const emotion = document.getElementById(`emotion-${charId}`);
                const config = sprites[charId];

                if (!sprite) return;

                if (config && config.visible) {
                    // Показываем спрайт
                    sprite.classList.add('visible');

                    // Подсветка говорящего
                    if (config.highlight) {
                        sprite.classList.add('highlighted');
                    } else {
                        sprite.classList.remove('highlighted');
                    }

                    // Эмоция
                    if (emotion && config.emotion) {
                        emotion.textContent = EMOTION_ICONS[config.emotion] || '😐';
                    }

                    // Позиция
                    if (config.position === 'left') {
                        sprite.style.order = '1';
                    } else if (config.position === 'center') {
                        sprite.style.order = '2';
                    } else if (config.position === 'right') {
                        sprite.style.order = '3';
                    }

                } else {
                    // Скрываем спрайт
                    sprite.classList.remove('visible', 'highlighted');
                    if (emotion) emotion.textContent = '';
                }
            });
        }

        function updateBackground(location) {
            const bg = document.getElementById('sceneBackground');
            const petals = document.getElementById('sakuraPetals');

            // Убираем все классы
            bg.className = 'scene-background';
            petals.classList.remove('active');

            // Добавляем нужный класс фона
            switch(location) {
                case 'classroom':
                    bg.classList.add('bg-classroom');
                    break;
                case 'rooftop':
                    bg.classList.add('bg-rooftop');
                    break;
                case 'library':
                    bg.classList.add('bg-library');
                    break;
                case 'courtyard':
                    bg.classList.add('bg-courtyard');
                    petals.classList.add('active');
                    break;
                default:
                    bg.classList.add('bg-classroom');
            }
        }

        function preloadBackgrounds() {
            const locations = ['classroom', 'rooftop', 'library', 'courtyard'];
            locations.forEach(loc => {
                const img = new Image();
                img.src = `/static/images/backgrounds/bg_${loc}.png`;
            });
        }

        function createSakuraPetals() {
            const container = document.getElementById('sakuraPetals');
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(petal);
            }
        }

        // ==================== ФУНКЦИИ ТЕКСТА ====================

        async function loadGame() {
            if (!sessionId) {
                document.getElementById('dialogueText').innerHTML =
                    '<span style="color: #ff6b6b;">Ошибка: нет ID сессии</span>';
                return;
            }

            try {
                const response = await fetch(`/api/load_game_data?session=${sessionId}`);
                const data = await response.json();

                if (data.success) {
                    gameData = data.game;

                    document.getElementById('locationLabel').textContent =
                        '📍 ' + data.game.location_name;

                    updateBackground(data.game.current_location);

                    if (gameData.game_history.length > 0) {
                        const lastScene = gameData.game_history[gameData.game_history.length - 1];
                        await displayScene(lastScene);
                    }

                    enableInput();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        async function typeText(element, text, speed = TYPING_SPEED) {
            isTyping = true;
            element.textContent = '';
            const cursor = document.getElementById('typingCursor');
            cursor.style.display = 'inline-block';

            disableInput();

            return new Promise((resolve) => {
                let index = 0;

                function type() {
                    if (index < text.length) {
                        element.textContent += text[index];
                        index++;

                        const char = text[index - 1];
                        const delay = (char === '.' || char === '!' || char === '?') ? speed * 5 :
                                     (char === ',' || char === ';') ? speed * 2.5 :
                                     speed + Math.random() * 15;

                        typingTimeout = setTimeout(type, delay);
                    } else {
                        cursor.style.display = 'none';
                        isTyping = false;
                        enableInput();
                        resolve();
                    }
                }

                type();
            });
        }

        function skipTyping() {
            if (isTyping && typingTimeout) {
                clearTimeout(typingTimeout);
                isTyping = false;

                const typingText = document.getElementById('typingText');
                if (currentScene) {
                    typingText.textContent = currentScene.type === 'player_action' ?
                        '🗣️ ' + currentScene.player_text :
                        currentScene.speaker_text;
                }

                document.getElementById('typingCursor').style.display = 'none';
                enableInput();
            }
        }

        async function displayScene(scene) {
            currentScene = scene;

            const nameBox = document.getElementById('speakerNameBox');
            nameBox.style.display = 'none';

            const narratorEl = document.getElementById('narratorText');
            narratorEl.textContent = '';

            disableInput();

            if (scene.type === 'player_action') {
                narratorEl.textContent = '';
                const typingEl = document.getElementById('typingText');
                typingEl.style.color = '#FFB6C1';
                document.getElementById('typingCursor').style.display = 'inline-block';
                await typeText(typingEl, '🗣️ ' + scene.player_text, FAST_TYPING_SPEED);

            } else {
                // Обновляем спрайты
                if (scene.sprites) {
                    updateSprites(scene.sprites);
                }

                // Обновляем фон
                if (scene.location) {
                    updateBackground(scene.location);
                    const locationNames = {
                        'classroom': 'Класс 2-B',
                        'rooftop': 'Школьная крыша',
                        'library': 'Библиотека',
                        'courtyard': 'Школьный двор'
                    };
                    document.getElementById('locationLabel').textContent =
                        '📍 ' + (locationNames[scene.location] || scene.location);
                }

                // Текст рассказчика
                if (scene.narrator_text) {
                    narratorEl.textContent = scene.narrator_text;
                }

                // Имя говорящего
                if (scene.speaker_id && scene.speaker_id !== 'narrator') {
                    nameBox.style.display = 'block';
                    const nameEl = document.getElementById('speakerName');
                    nameEl.textContent = scene.speaker_name;

                    const colors = {
                        'garfild': '#ff8c42',
                        'monika': '#ff69b4',
                        'reiko': '#00d4aa'
                    };
                    const bgColor = colors[scene.speaker_id] || '#FFB6C1';
                    nameEl.style.background = bgColor;
                    nameEl.style.color = '#000';
                    nameEl.style.boxShadow = `0 4px 15px ${bgColor}44`;
                }

                // Печатаем речь
                const typingEl = document.getElementById('typingText');
                typingEl.style.color = '#ffffff';
                document.getElementById('typingCursor').style.display = 'inline-block';

                if (scene.speaker_id === 'narrator') {
                    narratorEl.textContent = scene.speaker_text;
                    document.getElementById('typingCursor').style.display = 'none';
                    enableInput();
                    return;
                }

                await typeText(typingEl, scene.speaker_text);
            }
        }

        function enableInput() {
            const input = document.getElementById('playerInput');
            const button = document.getElementById('sendButton');
            input.disabled = false;
            button.disabled = false;
            input.focus();
        }

        function disableInput() {
            const input = document.getElementById('playerInput');
            const button = document.getElementById('sendButton');
            input.disabled = true;
            button.disabled = true;
        }

        async function sendAction() {
            if (isTyping) {
                skipTyping();
                return;
            }

            const input = document.getElementById('playerInput');
            const action = input.value.trim();

            if (!action) return;

            input.value = '';
            disableInput();

            await displayScene({ type: 'player_action', player_text: action });

            try {
                const response = await fetch('/api/game_action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, action: action })
                });

                const data = await response.json();

                if (data.success) {
                    await new Promise(r => setTimeout(r, 600));
                    await displayScene(data.scene);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                enableInput();
            }
        }

        function showHistory() {
            if (!gameData) return;
            console.log('📜 История игры:', gameData.game_history);
            alert(`В истории ${gameData.game_history.length} событий.\nКонсоль (F12) для деталей.`);
        }

        // ==================== ОБРАБОТЧИКИ ====================

        document.getElementById('playerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendAction();
            }
        });

        document.querySelector('.text-box-container').addEventListener('click', function(e) {
            if (isTyping && e.target !== document.getElementById('playerInput')) {
                skipTyping();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && isTyping && document.activeElement !== document.getElementById('playerInput')) {
                e.preventDefault();
                skipTyping();
            }
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        window.addEventListener('DOMContentLoaded', function() {
            createSakuraPetals();
            preloadBackgrounds();
            loadGame();
        });
    </script>
</body>
</html>
