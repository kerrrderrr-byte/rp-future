<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Future - Академия Сакура</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #000;
            user-select: none;
            cursor: default;
        }

        .novel-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Фон сцены */
        .scene-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        .scene-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            transition: background 1s ease;
        }

        /* Фоны */
        .bg-classroom { background-image: url('/static/images/backgrounds/bg_classroom.png'); }
        .bg-rooftop { background-image: url('/static/images/backgrounds/bg_rooftop.png'); }
        .bg-library { background-image: url('/static/images/backgrounds/bg_library.png'); }
        .bg-library::after { background: rgba(0, 0, 0, 0.25); }
        .bg-courtyard { background-image: url('/static/images/backgrounds/bg_courtyard.png'); }
        .bg-cafeteria { background-image: url('/static/images/backgrounds/bg_cafeteria.png'); }
        .bg-gym { background-image: url('/static/images/backgrounds/bg_gym.png'); }
        .bg-clubroom { background-image: url('/static/images/backgrounds/bg_clubroom.png'); }
        .bg-nursery { background-image: url('/static/images/backgrounds/bg_nursery.png'); }
        .bg-park { background-image: url('/static/images/backgrounds/bg_park.png'); }
        .bg-mall { background-image: url('/static/images/backgrounds/bg_mall.png'); }
        .bg-beach { background-image: url('/static/images/backgrounds/bg_beach.png'); }
        .bg-shrine { background-image: url('/static/images/backgrounds/bg_shrine.png'); }
        .bg-hallway { background-image: url('/static/images/backgrounds/bg_hallway.png'); }
        .bg-gate { background-image: url('/static/images/backgrounds/bg_gate.png'); }
        .bg-classroom-evening { background-image: url('/static/images/backgrounds/bg_classroom_evening.png'); }

        /* Виньетка */
        .scene-vignette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Лепестки сакуры */
        .sakura-petals {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: none;
        }

        .sakura-petals.active { display: block; }

        .petal {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255, 182, 193, 0.8);
            border-radius: 50% 0 50% 50%;
            animation: petalFall 8s linear infinite;
        }

        @keyframes petalFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translate(100px, 100vh) rotate(720deg); opacity: 0; }
        }

        /* Область сцены */
        .scene-area {
            flex: 1;
            position: relative;
            min-height: 55%;
            overflow: hidden;
            z-index: 1;
        }

        /* Контейнер спрайтов */
        .sprites-container {
            position: absolute;
            bottom: -5%;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            padding: 0 8%;
            z-index: 3;
        }

        /* Спрайт персонажа */
        .character-sprite {
            position: relative;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: none;
            filter: brightness(0.85) saturate(0.9) drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        .character-sprite.visible {
            display: block;
            animation: spriteAppear 0.8s ease;
        }

        .character-sprite.highlighted {
            filter: brightness(1.15) saturate(1.15) drop-shadow(0 0 25px rgba(255,255,255,0.7));
            transform: translateY(-8px) scale(1.04);
            z-index: 10;
        }

        @keyframes spriteAppear {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .character-sprite img {
            max-height: 75vh;
            max-width: 28vw;
            width: auto;
            height: auto;
            display: block;
            transition: all 0.8s ease;
            object-fit: contain;
            object-position: bottom;
            /* Опускаем вниз */
            margin-bottom: -20%;
        }

        .sprite-name {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 5px 14px;
            border-radius: 15px;
            font-size: 0.75em;
            white-space: nowrap;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.5s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .character-sprite.highlighted .sprite-name {
            opacity: 1;
            background: rgba(255,255,255,0.95);
            color: #000;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .emotion-bubble {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8em;
            animation: emotionFloat 2s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .character-sprite.highlighted .emotion-bubble { opacity: 1; }

        @keyframes emotionFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .location-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            color: #FFB6C1;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.85em;
            letter-spacing: 2px;
            border: 1px solid rgba(255,182,193,0.4);
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* Текстовое поле */
        .text-box-container {
            background: linear-gradient(180deg, rgba(10,10,20,0) 0%, rgba(10,10,20,0.95) 8%, rgba(10,10,20,0.98) 100%);
            padding: 25px 40px 30px;
            min-height: 35%;
            display: flex;
            flex-direction: column;
            border-top: 2px solid rgba(255,182,193,0.25);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .speaker-name-box {
            margin-bottom: 12px;
            display: none;
            animation: slideName 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideName {
            from { opacity: 0; transform: translateX(-20px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .speaker-name {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .speaker-name::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 22px;
            width: 12px;
            height: 12px;
            background: inherit;
            transform: rotate(45deg);
        }

        .narrator-text {
            color: #b0a0c0;
            font-style: italic;
            margin-bottom: 8px;
            font-size: 0.9em;
            line-height: 1.6;
            opacity: 0.9;
            min-height: 24px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .dialogue-text {
            color: #ffffff;
            font-size: 1.15em;
            line-height: 1.8;
            margin-bottom: 15px;
            flex: 1;
            letter-spacing: 0.8px;
            position: relative;
            min-height: 30px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #FFB6C1;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.8s infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        #playerInput {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,182,193,0.3);
            color: #fff;
            padding: 14px 22px;
            border-radius: 30px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        #playerInput:focus {
            border-color: #FFB6C1;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 25px rgba(255,182,193,0.2);
        }

        #playerInput::placeholder {
            color: #6a5a7a;
            font-style: italic;
        }

        .send-button {
            background: linear-gradient(135deg, #ff69b4, #ff8c42);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255,105,180,0.3);
        }

        .send-button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255,105,180,0.5);
        }

        .send-button:active { transform: scale(0.95); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .continue-hint {
            position: absolute;
            bottom: 8px;
            right: 40px;
            color: #8a7a9a;
            font-size: 0.75em;
            animation: hintPulse 2s infinite;
            pointer-events: none;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .history-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            color: #FFB6C1;
            border: 1px solid rgba(255,182,193,0.3);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85em;
            z-index: 20;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .history-button:hover {
            background: rgba(255,105,180,0.2);
            box-shadow: 0 0 20px rgba(255,105,180,0.3);
        }

        .disable-selection {
            user-select: none;
            -webkit-user-select: none;
        }

        @media (max-width: 768px) {
            .sprites-container { gap: 15px; padding: 0 2%; }
            .character-sprite img { max-height: 45vh; max-width: 28vw; }
            .text-box-container { padding: 20px 25px 25px; }
        }
    </style>
</head>
<body class="disable-selection">
    <div class="novel-container">
        <!-- Фон сцены -->
        <div class="scene-background bg-classroom" id="sceneBackground"></div>
        <div class="scene-vignette"></div>

        <!-- Область сцены -->
        <div class="scene-area" id="sceneArea">
            <div class="location-label" id="locationLabel">📍 Загрузка...</div>

            <div class="sprites-container" id="spritesContainer">
                <!-- Гарфилд -->
                <div class="character-sprite" id="sprite-garfild" data-position="left" style="order: 1;">

                <!-- Моника -->
                <div class="character-sprite" id="sprite-monika" data-position="center" style="order: 2;">

                <div class="character-sprite" id="sprite-hana" data-position="center" style="order: 6;">

                <div class="character-sprite" id="sprite-sensei" data-position="center" style="order: 9;">

                </div>

                <!-- Юми -->
                <div class="character-sprite" id="sprite-yumi" data-position="left" style="order: 10;">

                </div>

                <div class="character-sprite" id="sprite-ryuu" data-position="right" style="order: 11;">

                <div class="character-sprite" id="sprite-emi" data-position="center" style="order: 12;">

        <!-- Текстовое поле -->
        <div class="text-box-container">
            <div class="speaker-name-box" id="speakerNameBox">

            <div class="narrator-text" id="narratorText"></div>

                <span class="typing-cursor" id="typingCursor"></span>

            <div class="input-area">
                <input type="text" id="playerInput" placeholder="Что ты хочешь сделать или сказать?" maxlength="200" autocomplete="off" disabled>

        <button class="history-button" onclick="showHistory()">📜 История</button>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let gameData = null;
        let currentScene = null;
        let isTyping = false;
        let typingTimeout = null;
        let waitingForInput = true;
        const sessionId = new URLSearchParams(window.location.search).get('session');

        const TYPING_SPEED = 40;
        const FAST_TYPING_SPEED = 12;

        const EMOTION_ICONS = {
            'радость': '😊', 'грусть': '😢', 'злость': '😠',
            'удивление': '😲', 'нейтрально': '😐', 'смущение': '😳',
            'восторг': '🤩', 'happy': '😊', 'sad': '😢',
            'angry': '😠', 'surprised': '😲', 'normal': '😐',
            'excited': '🤩', 'serious': '🧐', 'shy': '😳',
            'flirty': '😏', 'worried': '😟', 'proud': '😤'
        };

        const CHAR_COLORS = {
            'garfild': '#ff8c42', 'monika': '#ff69b4', 'reiko': '#00d4aa',
            'yuki': '#b8a9d4', 'takeshi': '#ff4444', 'hana': '#4da6ff',
            'haru': '#ffd700', 'akira': '#7cfc00', 'sensei': '#deb887',
            'yumi': '#ff9999', 'ryuu': '#808080', 'emi': '#ff1493'
        };

        const CHAR_NAMES = {
            'garfild': 'Гарфилд', 'monika': 'Моника', 'reiko': 'Рейко',
            'yuki': 'Юки', 'takeshi': 'Такеши', 'hana': 'Хана',
            'haru': 'Хару', 'akira': 'Акира', 'sensei': 'Танака-сенсей',
            'yumi': 'Юми', 'ryuu': 'Рю', 'emi': 'Эми'
        };

        const LOCATION_NAMES = {
            'classroom': 'Класс 2-B', 'rooftop': 'Школьная крыша',
            'library': 'Библиотека', 'courtyard': 'Школьный двор',
            'cafeteria': 'Столовая', 'gym': 'Спортзал',
            'clubroom': 'Клубная комната', 'nursery': 'Медкабинет',
            'park': 'Приморский парк', 'mall': 'ТЦ Сакура-Молл',
            'beach': 'Пляж', 'shrine': 'Храм',
            'hallway': 'Коридор', 'gate': 'Ворота школы',
            'classroom_evening': 'Класс (вечер)'
        };

        // ==================== ФУНКЦИИ СПРАЙТОВ ====================
        function updateSprites(sprites) {
            if (!sprites) return;

            Object.keys(sprites).forEach(charId => {
                const sprite = document.getElementById(`sprite-${charId}`);
                const emotion = document.getElementById(`emotion-${charId}`);
                const config = sprites[charId];

                if (!sprite) return;

                if (config && config.visible) {
                    sprite.classList.add('visible');
                    if (config.highlight) {
                        sprite.classList.add('highlighted');
                    } else {
                        sprite.classList.remove('highlighted');
                    }
                    if (emotion && config.emotion) {
                        emotion.textContent = EMOTION_ICONS[config.emotion] || '😐';
                    }
                } else {
                    sprite.classList.remove('visible', 'highlighted');
                    if (emotion) emotion.textContent = '';
                }
            });
        }

        function updateBackground(location) {
            const bg = document.getElementById('sceneBackground');
            const petals = document.getElementById('sakuraPetals');

            bg.className = 'scene-background';
            petals.classList.remove('active');

            const bgClasses = {
                'classroom': 'bg-classroom', 'rooftop': 'bg-rooftop',
                'library': 'bg-library', 'courtyard': 'bg-courtyard',
                'cafeteria': 'bg-cafeteria', 'gym': 'bg-gym',
                'clubroom': 'bg-clubroom', 'nursery': 'bg-nursery',
                'park': 'bg-park', 'mall': 'bg-mall',
                'beach': 'bg-beach', 'shrine': 'bg-shrine',
                'hallway': 'bg-hallway', 'gate': 'bg-gate',
                'classroom_evening': 'bg-classroom-evening'
            };

            if (bgClasses[location]) {
                bg.classList.add(bgClasses[location]);
                if (location === 'courtyard') petals.classList.add('active');
            } else {
                bg.classList.add('bg-classroom');
            }
        }

        function createSakuraPetals() {
            const container = document.getElementById('sakuraPetals');
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(petal);
            }
        }

        // ==================== ФУНКЦИИ ТЕКСТА ====================
        async function loadGame() {
            if (!sessionId) {
                document.getElementById('typingText').textContent = 'Ошибка: нет ID сессии';
                return;
            }

            try {
                const response = await fetch(`/api/load_game_data?session=${sessionId}`);
                const data = await response.json();

                if (data.success) {
                    gameData = data.game;
                    document.getElementById('locationLabel').textContent = '📍 ' + data.game.location_name;
                    updateBackground(data.game.current_location);

                    if (gameData.game_history.length > 0) {
                        const lastScene = gameData.game_history[gameData.game_history.length - 1];
                        await displayScene(lastScene);
                    }

                    waitingForInput = true;
                    enableInput();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('typingText').textContent = 'Ошибка загрузки игры';
                enableInput();
            }
        }

        async function typeText(element, text, speed = TYPING_SPEED) {
            isTyping = true;
            element.textContent = '';
            const cursor = document.getElementById('typingCursor');
            cursor.style.display = 'inline-block';
            disableInput();

            return new Promise((resolve) => {
                let index = 0;

                function type() {
                    if (index < text.length) {
                        element.textContent += text[index];
                        index++;

                        const char = text[index - 1];
                        const delay = (char === '.' || char === '!' || char === '?') ? speed * 5 :
                                     (char === ',' || char === ';') ? speed * 2.5 :
                                     speed + Math.random() * 15;

                        typingTimeout = setTimeout(type, delay);
                    } else {
                        cursor.style.display = 'none';
                        isTyping = false;
                        resolve();
                    }
                }

                type();
            });
        }

        function skipTyping() {
            if (isTyping && typingTimeout) {
                clearTimeout(typingTimeout);
                isTyping = false;

                const typingText = document.getElementById('typingText');
                if (currentScene) {
                    typingText.textContent = currentScene.type === 'player_action' ?
                        '🗣️ ' + currentScene.player_text :
                        (currentScene.speaker_text || '');
                }

                document.getElementById('typingCursor').style.display = 'none';
            }
        }

        async function displayDialog(scene) {
            const nameBox = document.getElementById('speakerNameBox');
            const typingEl = document.getElementById('typingText');

            for (let i = 0; i < scene.dialog_chain.length; i++) {
                const line = scene.dialog_chain[i];
                const speakerId = line.speaker;

                const sprite = document.getElementById(`sprite-${speakerId}`);
                if (sprite) sprite.classList.add('highlighted');

                nameBox.style.display = 'block';
                const nameEl = document.getElementById('speakerName');
                nameEl.textContent = CHAR_NAMES[speakerId] || speakerId;
                const bgColor = CHAR_COLORS[speakerId] || '#fff';
                nameEl.style.background = bgColor;
                nameEl.style.color = '#000';
                nameEl.style.boxShadow = `0 4px 15px ${bgColor}44`;

                typingEl.innerHTML = '';
                document.getElementById('typingCursor').style.display = 'inline-block';
                document.getElementById('typingCursor').style.background = bgColor;

                const tempSpan = document.createElement('span');
                tempSpan.style.color = bgColor;
                typingEl.appendChild(tempSpan);

                await typeText(tempSpan, line.text, 30);
                await new Promise(r => setTimeout(r, 400));

                if (i < scene.dialog_chain.length - 1 && sprite) {
                    sprite.classList.remove('highlighted');
                }
            }

            updateSprites(scene.sprites);
            document.getElementById('typingCursor').style.display = 'none';
        }

        async function displayScene(scene) {
            currentScene = scene;

            const nameBox = document.getElementById('speakerNameBox');
            nameBox.style.display = 'none';

            const narratorEl = document.getElementById('narratorText');
            narratorEl.textContent = '';

            const typingEl = document.getElementById('typingText');
            typingEl.textContent = '';

            disableInput();

            if (scene.type === 'player_action') {
                typingEl.style.color = '#FFB6C1';
                document.getElementById('typingCursor').style.display = 'inline-block';
                await typeText(typingEl, '🗣️ ' + scene.player_text, FAST_TYPING_SPEED);
                enableInput();
                return;
            }

            // Обновляем спрайты и фон
            if (scene.sprites) updateSprites(scene.sprites);
            if (scene.location) {
                updateBackground(scene.location);
                document.getElementById('locationLabel').textContent =
                    '📍 ' + (LOCATION_NAMES[scene.location] || scene.location);
            }

            if (scene.narrator_text) {
                narratorEl.textContent = scene.narrator_text;
            }

            // Диалог или одиночная реплика
            if (scene.dialog_chain && scene.dialog_chain.length > 0) {
                await displayDialog(scene);
            } else {
                const speakerId = scene.speaker_id || 'narrator';

                if (speakerId !== 'narrator') {
                    nameBox.style.display = 'block';
                    const nameEl = document.getElementById('speakerName');
                    nameEl.textContent = scene.speaker_name || CHAR_NAMES[speakerId] || 'Персонаж';
                    const bgColor = CHAR_COLORS[speakerId] || '#FFB6C1';
                    nameEl.style.background = bgColor;
                    nameEl.style.color = '#000';
                    nameEl.style.boxShadow = `0 4px 15px ${bgColor}44`;
                }

                const textToType = scene.speaker_text || '...';
                typingEl.style.color = speakerId === 'narrator' ? '#c0c0c0' : '#ffffff';
                document.getElementById('typingCursor').style.display = 'inline-block';
                await typeText(typingEl, textToType);
            }

            // Маркер конца диалога
            if (scene.dialog_end_marker === 'direct_question_to_player') {
                await new Promise(r => setTimeout(r, 400));
                const hint = document.createElement('div');
                hint.style.cssText = 'color: #FFB6C1; font-size: 0.9em; margin-top: 8px; animation: textFadeIn 0.5s ease;';
                hint.textContent = '→ Ждут твоего ответа...';
                document.getElementById('dialogueText').appendChild(hint);
                setTimeout(() => hint.remove(), 3000);
            }

            waitingForInput = true;
            enableInput();
        }

        function enableInput() {
            const input = document.getElementById('playerInput');
            const button = document.getElementById('sendButton');
            input.disabled = false;
            button.disabled = false;
            waitingForInput = true;
            setTimeout(() => { if (!isTyping) input.focus(); }, 100);
        }

        function disableInput() {
            document.getElementById('playerInput').disabled = true;
            document.getElementById('sendButton').disabled = true;
            waitingForInput = false;
        }

        async function sendAction() {
            if (isTyping) {
                skipTyping();
                setTimeout(() => enableInput(), 50);
                return;
            }

            if (!waitingForInput) return;

            const input = document.getElementById('playerInput');
            const action = input.value.trim();

            if (!action) { input.focus(); return; }

            input.value = '';
            disableInput();

            await displayScene({ type: 'player_action', player_text: action });

            try {
                const response = await fetch('/api/game_action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, action: action })
                });

                const data = await response.json();

                if (data.success && data.scene) {
                    await new Promise(r => setTimeout(r, 600));
                    await displayScene(data.scene);
                } else if (data.error) {
                    document.getElementById('typingText').textContent = '⚠️ ' + data.error;
                    enableInput();
                }
            } catch (error) {
                console.error('Ошибка отправки:', error);
                document.getElementById('typingText').textContent = '⚠️ Ошибка соединения. Попробуй снова.';
                enableInput();
            }
        }

        function showHistory() {
            if (!gameData || !gameData.game_history) return;
            console.log('📜 История игры:', gameData.game_history);
            alert(`В истории ${gameData.game_history.length} событий.`);
        }

        // ==================== ОБРАБОТЧИКИ ====================
        document.getElementById('playerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); sendAction(); }
        });

        document.getElementById('sendButton').addEventListener('click', function(e) {
            e.preventDefault(); sendAction();
        });

        document.getElementById('sendButton').addEventListener('touchend', function(e) {
            e.preventDefault(); sendAction();
        });

        document.querySelector('.text-box-container').addEventListener('click', function(e) {
            if (isTyping && e.target !== document.getElementById('playerInput') && e.target.id !== 'sendButton') {
                skipTyping();
                setTimeout(() => enableInput(), 50);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && isTyping && document.activeElement !== document.getElementById('playerInput')) {
                e.preventDefault();
                skipTyping();
                setTimeout(() => enableInput(), 50);
            }
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        window.addEventListener('DOMContentLoaded', function() {
            console.log('🎮 RP Future - Загрузка игры...');
            console.log('📱 Session ID:', sessionId);

            ['classroom', 'rooftop', 'library', 'courtyard', 'cafeteria', 'gym',
             'clubroom', 'nursery', 'park', 'mall', 'beach', 'shrine',
             'hallway', 'gate', 'classroom_evening'].forEach(loc => {
                const img = new Image();
                img.src = `/static/images/backgrounds/bg_${loc}.png`;
            });

            createSakuraPetals();
            loadGame();

            document.addEventListener('click', function(e) {
                const input = document.getElementById('playerInput');
                if (!isTyping && waitingForInput && e.target !== input &&
                    !e.target.classList.contains('send-button') &&
                    !e.target.classList.contains('history-button')) {
                    input.focus();
                }
            });
        });
    </script>
</body>
</html>
